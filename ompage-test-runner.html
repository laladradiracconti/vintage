<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ompage QA Runner</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  :root {
    color-scheme: light;
    --bg: #f4f2ed;
    --panel: #ffffff;
    --panel-2: #f8f6f1;
    --ink: #171717;
    --muted: #66615a;
    --soft: #a39b91;
    --line: rgba(23,23,23,.12);
    --line-strong: rgba(23,23,23,.22);
    --pass: #0d8f67;
    --pass-bg: #e4f6ef;
    --warn: #ad6b13;
    --warn-bg: #fbefd9;
    --fail: #c93b32;
    --fail-bg: #fbe9e7;
    --info: #315d91;
    --info-bg: #e7eff8;
    --radius: 8px;
    --mono: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
      --bg: #131313;
      --panel: #1d1d1d;
      --panel-2: #262626;
      --ink: #f3f0eb;
      --muted: #b4ada5;
      --soft: #7e766f;
      --line: rgba(255,255,255,.12);
      --line-strong: rgba(255,255,255,.22);
      --pass-bg: #08382d;
      --warn-bg: #3b2608;
      --fail-bg: #431513;
      --info-bg: #132b49;
    }
  }

  html, body { height: 100%; margin: 0; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 14px;
  }
  button, input { font: inherit; }
  button { cursor: pointer; }

  .app {
    height: 100%;
    display: grid;
    grid-template-columns: 320px minmax(0, 1fr);
  }
  .sidebar {
    min-width: 0;
    background: var(--panel);
    border-right: 1px solid var(--line);
    display: grid;
    grid-template-rows: auto auto minmax(0, 1fr);
  }
  .brand {
    padding: 18px 18px 15px;
    border-bottom: 1px solid var(--line);
  }
  .brand h1 {
    margin: 0;
    font-size: 16px;
    letter-spacing: 0;
    font-weight: 700;
  }
  .brand p {
    margin: 5px 0 0;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.45;
  }
  .score {
    padding: 15px 18px;
    border-bottom: 1px solid var(--line);
    display: grid;
    grid-template-columns: 58px minmax(0, 1fr);
    align-items: center;
    gap: 13px;
  }
  .score svg { width: 58px; height: 58px; display: block; }
  .score strong { display: block; font-size: 14px; }
  .score span { display: block; color: var(--muted); font-size: 12px; line-height: 1.5; margin-top: 2px; }
  .checks { overflow: auto; padding: 8px; }
  .category {
    color: var(--soft);
    text-transform: uppercase;
    letter-spacing: .08em;
    font-size: 10px;
    font-weight: 800;
    padding: 13px 9px 6px;
  }
  .check-row {
    width: 100%;
    border: 0;
    color: inherit;
    background: transparent;
    border-radius: var(--radius);
    padding: 8px 9px;
    display: grid;
    grid-template-columns: 20px minmax(0, 1fr);
    gap: 9px;
    text-align: left;
  }
  .check-row:hover, .check-row.is-active { background: var(--panel-2); }
  .dot {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    display: inline-grid;
    place-items: center;
    font-size: 10px;
    font-weight: 800;
    background: var(--panel-2);
    color: var(--soft);
    margin-top: 1px;
  }
  .dot.pass { background: var(--pass-bg); color: var(--pass); }
  .dot.warn { background: var(--warn-bg); color: var(--warn); }
  .dot.fail { background: var(--fail-bg); color: var(--fail); }
  .dot.info { background: var(--info-bg); color: var(--info); }
  .dot.running { background: var(--warn-bg); color: var(--warn); animation: pulse .7s infinite alternate; }
  @keyframes pulse { from { opacity: .45; } to { opacity: 1; } }
  .check-name { font-size: 12.5px; font-weight: 650; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .check-desc { margin-top: 2px; color: var(--muted); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .main {
    min-width: 0;
    display: grid;
    grid-template-rows: auto auto minmax(0, 1fr);
  }
  .toolbar {
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    padding: 12px;
    display: grid;
    grid-template-columns: 1.1fr .9fr auto auto auto;
    gap: 8px;
    align-items: center;
  }
  .input {
    min-width: 0;
    width: 100%;
    border: 1px solid var(--line-strong);
    border-radius: var(--radius);
    background: var(--panel-2);
    color: var(--ink);
    padding: 8px 10px;
    font-family: var(--mono);
    font-size: 12px;
  }
  .btn {
    min-height: 36px;
    border: 1px solid var(--line-strong);
    border-radius: var(--radius);
    background: var(--panel);
    color: var(--ink);
    padding: 0 13px;
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
  }
  .btn:hover { background: var(--panel-2); }
  .btn.primary { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .btn:disabled { opacity: .5; cursor: wait; }
  .progress {
    height: 3px;
    background: var(--panel-2);
    overflow: hidden;
  }
  .progress div {
    height: 100%;
    width: 0;
    background: var(--pass);
    transition: width .25s ease, background .25s ease;
  }
  .output {
    min-height: 0;
    overflow: auto;
    padding: 16px;
    display: grid;
    align-content: start;
    gap: 10px;
  }
  .empty {
    min-height: calc(100vh - 120px);
    display: grid;
    place-items: center;
    text-align: center;
    color: var(--muted);
  }
  .empty div { max-width: 430px; line-height: 1.6; }
  .summary {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px;
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 16px;
    align-items: center;
  }
  .summary h2 { margin: 0; font-size: 18px; letter-spacing: 0; }
  .summary p { margin: 5px 0 0; color: var(--muted); line-height: 1.55; }
  .summary-numbers { display: flex; gap: 14px; }
  .summary-number { min-width: 58px; text-align: center; }
  .summary-number strong { display: block; font-size: 24px; line-height: 1; }
  .summary-number span { display: block; margin-top: 4px; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .06em; }
  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
  }
  .card.fail { border-color: color-mix(in srgb, var(--fail) 45%, var(--line)); }
  .card.warn { border-color: color-mix(in srgb, var(--warn) 45%, var(--line)); }
  .card-head {
    width: 100%;
    border: 0;
    color: inherit;
    background: transparent;
    padding: 12px 14px;
    display: grid;
    grid-template-columns: auto minmax(0, 1fr) auto;
    gap: 10px;
    align-items: center;
    text-align: left;
  }
  .badge {
    border-radius: 5px;
    padding: 3px 7px;
    font-size: 10px;
    font-weight: 900;
    letter-spacing: .05em;
    text-transform: uppercase;
  }
  .badge.pass { background: var(--pass-bg); color: var(--pass); }
  .badge.warn { background: var(--warn-bg); color: var(--warn); }
  .badge.fail { background: var(--fail-bg); color: var(--fail); }
  .badge.info { background: var(--info-bg); color: var(--info); }
  .card-title { min-width: 0; font-weight: 750; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-body {
    display: none;
    border-top: 1px solid var(--line);
    padding: 12px 14px 14px;
  }
  .card.is-open .card-body { display: block; }
  .detail {
    color: var(--muted);
    font-family: var(--mono);
    white-space: pre-wrap;
    overflow-wrap: anywhere;
    line-height: 1.65;
    font-size: 12px;
  }
  .fix {
    margin-top: 11px;
    color: var(--info);
    background: var(--info-bg);
    border-radius: var(--radius);
    padding: 9px 10px;
    line-height: 1.55;
    font-size: 12px;
  }
  .fix strong { color: inherit; }
  .preview {
    position: fixed;
    inset: 0;
    z-index: 10;
    background: rgba(0,0,0,.72);
    display: none;
    padding: 24px;
  }
  .preview.open { display: grid; }
  .preview-box {
    min-width: 0;
    min-height: 0;
    background: var(--panel);
    border-radius: 12px;
    overflow: hidden;
    display: grid;
    grid-template-rows: auto minmax(0, 1fr);
  }
  .preview-head {
    border-bottom: 1px solid var(--line);
    padding: 10px;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .preview-url { flex: 1; min-width: 0; color: var(--muted); font-family: var(--mono); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .preview-frame-wrap { background: #d6d2ca; display: flex; justify-content: center; min-height: 0; overflow: hidden; }
  .preview-frame-wrap iframe { height: 100%; border: 0; background: white; }
  .preview-frame-wrap.desktop iframe { width: 100%; }
  .preview-frame-wrap.tablet iframe { width: 768px; max-width: 100%; }
  .preview-frame-wrap.mobile iframe { width: 390px; max-width: 100%; }

  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .toolbar { grid-template-columns: 1fr; }
    .summary { grid-template-columns: 1fr; }
    .summary-numbers { justify-content: space-between; }
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <h1>Ompage QA Runner</h1>
      <p>Controlli per index, config e pannello senza falsi positivi aggressivi.</p>
    </div>
    <div class="score">
      <svg viewBox="0 0 58 58" aria-hidden="true">
        <circle cx="29" cy="29" r="24" fill="none" stroke="var(--line)" stroke-width="5"></circle>
        <circle id="scoreArc" cx="29" cy="29" r="24" fill="none" stroke="var(--pass)" stroke-width="5" stroke-linecap="round" stroke-dasharray="150.8" stroke-dashoffset="150.8" transform="rotate(-90 29 29)"></circle>
        <text id="scoreText" x="29" y="34" text-anchor="middle" fill="currentColor" font-size="13" font-weight="800">--</text>
      </svg>
      <div>
        <strong id="scoreLabel">In attesa</strong>
        <span id="scoreSub">Carica il sito e avvia i test.</span>
      </div>
    </div>
    <div class="checks" id="checks"></div>
  </aside>

  <main class="main">
    <div class="toolbar">
      <input class="input" id="siteUrl" value="./index.html" aria-label="Percorso index.html">
      <input class="input" id="panelUrl" value="./pannello.html" aria-label="Percorso pannello.html">
      <button class="btn" id="previewBtn" type="button">Preview</button>
      <button class="btn" id="copyBtn" type="button">Copia report</button>
      <button class="btn primary" id="runBtn" type="button">Avvia test</button>
    </div>
    <div class="progress"><div id="progress"></div></div>
    <section class="output" id="output">
      <div class="empty">
        <div>
          <strong>Pronto.</strong><br>
          Apri questo file dallo stesso server locale del sito, poi premi Avvia test. Se lo apri con file:// il browser potrebbe bloccare fetch di index/config.
        </div>
      </div>
    </section>
  </main>
</div>

<div class="preview" id="preview" aria-hidden="true">
  <div class="preview-box">
    <div class="preview-head">
      <span class="preview-url" id="previewUrl">--</span>
      <button class="btn" type="button" data-vp="desktop">Desktop</button>
      <button class="btn" type="button" data-vp="tablet">Tablet</button>
      <button class="btn" type="button" data-vp="mobile">Mobile</button>
      <button class="btn" type="button" id="closePreview">Chiudi</button>
    </div>
    <div class="preview-frame-wrap desktop" id="previewWrap">
      <iframe id="previewFrame" title="Anteprima sito"></iframe>
    </div>
  </div>
</div>

<script>
(function () {
  "use strict";

  const CHECKS = [
    { id: "load-index", cat: "Caricamento", name: "index.html leggibile", desc: "HTML caricato e parsato" },
    { id: "load-config", cat: "Caricamento", name: "config.json valido", desc: "JSON caricato dalla stessa cartella" },
    { id: "load-panel", cat: "Caricamento", name: "pannello.html leggibile", desc: "Controllo opzionale del pannello" },
    { id: "data-keys", cat: "Motore dati", name: "Chiavi data-*", desc: "data-text, data-src, toggle e CTA esistono nel config" },
    { id: "toggles", cat: "Motore dati", name: "Toggle SI/NO", desc: "Niente booleani true/false nel config" },
    { id: "variants", cat: "Motore dati", name: "Varianti", desc: "Valori config compatibili con data-variant" },
    { id: "repeats", cat: "Motore dati", name: "Liste ripetute", desc: "Template, required e show-repeat coerenti" },
    { id: "images", cat: "Contenuti", name: "Immagini e placeholder", desc: "data-src e data-placeholder verificati" },
    { id: "editable-texts", cat: "Contenuti", name: "Testi cliente", desc: "Nessun testo cliente hardcoded nel corpo sito" },
    { id: "cta", cat: "Contenuti", name: "CTA e contatti", desc: "WHATSAPP, TELEFONO, EMAIL e fallback contatti" },
    { id: "fallbacks", cat: "Contenuti", name: "Fallback testi", desc: "Fallback separati da contenuti cliente vuoti" },
    { id: "title-mask", cat: "Layout", name: "Heading e title-mask", desc: "H1/H2/H3 principali nel wrapper" },
    { id: "clamp-fonts", cat: "Layout", name: "Font responsive", desc: "Regole heading con clamp()" },
    { id: "overflow", cat: "Layout", name: "Anti overflow", desc: "anywhere, clamp e overflow-x: clip" },
    { id: "badge", cat: "Layout", name: "Badge mobile", desc: "Nascosto desktop, visibile solo mobile" },
    { id: "class-style", cat: "Qualita", name: "Classi generiche", desc: "Controllo BEM come warning leggero" },
    { id: "seo", cat: "SEO", name: "Meta e schema", desc: "SEO, OG e LocalBusiness" },
    { id: "panel-config", cat: "Pannello", name: "Pannello e config", desc: "Sezioni, limiti e chiavi derivate" }
  ];

  const GENERIC_CLASSES = ["card", "wrapper", "container", "box", "item", "inner", "content", "text", "image", "grid", "list", "section", "row", "col", "btn", "button"];
  const CTA_TYPES = ["WHATSAPP", "TELEFONO", "EMAIL", "PRENOTAZIONI"];
  const TEXT_ATTRS = ["data-text", "data-show-text", "data-fallback-keys", "data-cta-type", "data-expires-key", "data-file-key", "data-alt", "data-nav-key", "data-section-key", "data-class-key", "data-href-tel", "data-href-whatsapp", "data-href-email", "data-href-url"];
  const IMAGE_ATTRS = ["data-src", "data-placeholder", "data-bg"];
  const KEY_ATTRS = TEXT_ATTRS.concat(IMAGE_ATTRS, ["data-show-key", "data-variant-key"]);
  const ALLOWED_HARDCODED = [
    "Menu", "Chiudi", "Privacy Policy", "Cookie Policy", "OK, ho capito",
    "Orari:", "Titolare del trattamento:", "Ultimo aggiornamento:", "I nostri punti di forza"
  ];

  const state = {
    url: "",
    configUrl: "",
    panelUrl: "",
    html: "",
    panelHtml: "",
    doc: null,
    config: null,
    css: "",
    results: [],
    startedAt: null
  };

  const $ = (sel, root = document) => root.querySelector(sel);
  const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));

  function buildSidebar() {
    const host = $("#checks");
    host.innerHTML = "";
    let cat = "";
    CHECKS.forEach(check => {
      if (check.cat !== cat) {
        cat = check.cat;
        const label = document.createElement("div");
        label.className = "category";
        label.textContent = cat;
        host.appendChild(label);
      }
      const row = document.createElement("button");
      row.className = "check-row";
      row.type = "button";
      row.dataset.id = check.id;
      row.innerHTML = '<span class="dot" id="dot-' + check.id + '">-</span><span><span class="check-name">' + escapeHtml(check.name) + '</span><span class="check-desc">' + escapeHtml(check.desc) + '</span></span>';
      row.addEventListener("click", () => {
        const card = document.getElementById("card-" + check.id);
        if (card) card.scrollIntoView({ behavior: "smooth", block: "center" });
      });
      host.appendChild(row);
    });
  }

  function escapeHtml(value) {
    return String(value ?? "").replace(/[&<>"']/g, ch => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#039;"
    }[ch]));
  }

  function absoluteUrl(input) {
    return new URL(input, window.location.href).href;
  }

  function siblingUrl(url, fileName) {
    const u = new URL(url, window.location.href);
    u.pathname = u.pathname.replace(/[^/]*$/, fileName);
    u.search = "";
    u.hash = "";
    return u.href;
  }

  function setDot(id, status) {
    const dot = $("#dot-" + id);
    if (!dot) return;
    dot.className = "dot " + status;
    dot.textContent = status === "pass" ? "P" : status === "warn" ? "W" : status === "fail" ? "F" : status === "info" ? "I" : "-";
  }

  function addResult(id, status, title, detail, fix) {
    const check = CHECKS.find(item => item.id === id);
    const result = {
      id,
      status,
      title: title || (check ? check.name : id),
      detail: detail || "",
      fix: fix || ""
    };
    state.results.push(result);
    setDot(id, status);
    renderResult(result);
    updateScore();
    return result;
  }

  function renderResult(result) {
    const out = $("#output");
    const empty = $(".empty", out);
    if (empty) empty.remove();

    const card = document.createElement("article");
    card.className = "card " + result.status;
    card.id = "card-" + result.id;
    const open = result.status === "fail" || result.status === "warn";
    if (open) card.classList.add("is-open");
    card.innerHTML =
      '<button class="card-head" type="button">' +
      '<span class="badge ' + result.status + '">' + result.status + '</span>' +
      '<span class="card-title">' + escapeHtml(result.title) + '</span>' +
      '<span aria-hidden="true">' + (open ? "meno" : "piu") + '</span>' +
      '</button>' +
      '<div class="card-body">' +
      '<div class="detail">' + escapeHtml(result.detail || "Nessun dettaglio.") + '</div>' +
      (result.fix ? '<div class="fix"><strong>Come intervenire:</strong> ' + escapeHtml(result.fix) + '</div>' : "") +
      '</div>';
    $(".card-head", card).addEventListener("click", () => card.classList.toggle("is-open"));
    out.appendChild(card);
  }

  function updateScore() {
    const total = state.results.length || CHECKS.length;
    const pass = state.results.filter(r => r.status === "pass").length;
    const warn = state.results.filter(r => r.status === "warn").length;
    const fail = state.results.filter(r => r.status === "fail").length;
    const done = state.results.length;
    const quality = done ? Math.round(((pass + state.results.filter(r => r.status === "info").length * .6) / done) * 100) : 0;
    const arc = $("#scoreArc");
    const text = $("#scoreText");
    const label = $("#scoreLabel");
    const sub = $("#scoreSub");
    const progress = $("#progress");
    if (arc) {
      arc.style.strokeDashoffset = String(150.8 - (150.8 * quality / 100));
      arc.style.stroke = fail ? "var(--fail)" : warn ? "var(--warn)" : "var(--pass)";
    }
    if (text) text.textContent = done ? String(quality) : "--";
    if (label) label.textContent = fail ? "Problemi da correggere" : warn ? "Avvisi da valutare" : done ? "Tutto pulito" : "In attesa";
    if (sub) sub.textContent = pass + " pass, " + warn + " warn, " + fail + " fail su " + total;
    if (progress) {
      progress.style.width = Math.round((done / CHECKS.length) * 100) + "%";
      progress.style.background = fail ? "var(--fail)" : warn ? "var(--warn)" : "var(--pass)";
    }
  }

  function renderSummary() {
    const pass = state.results.filter(r => r.status === "pass").length;
    const warn = state.results.filter(r => r.status === "warn").length;
    const fail = state.results.filter(r => r.status === "fail").length;
    const info = state.results.filter(r => r.status === "info").length;
    const elapsed = state.startedAt ? ((performance.now() - state.startedAt) / 1000).toFixed(1) : "0.0";
    const card = document.createElement("section");
    card.className = "summary";
    card.innerHTML =
      '<div><h2>Report completato</h2>' +
      '<p>Tempo: ' + elapsed + 's. I FAIL sono problemi veri o molto probabili. I WARN sono controlli da valutare nel contesto del template.</p></div>' +
      '<div class="summary-numbers">' +
      '<div class="summary-number"><strong style="color:var(--pass)">' + pass + '</strong><span>pass</span></div>' +
      '<div class="summary-number"><strong style="color:var(--warn)">' + warn + '</strong><span>warn</span></div>' +
      '<div class="summary-number"><strong style="color:var(--fail)">' + fail + '</strong><span>fail</span></div>' +
      '<div class="summary-number"><strong style="color:var(--info)">' + info + '</strong><span>info</span></div>' +
      '</div>';
    $("#output").prepend(card);
  }

  async function fetchText(url) {
    const res = await fetch(url, { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status + " su " + url);
    return res.text();
  }

  function parseCss(doc) {
    return $$("style", doc).map(style => style.textContent || "").join("\n");
  }

  function splitKeys(value) {
    return String(value || "")
      .split(",")
      .map(item => item.trim())
      .filter(Boolean);
  }

  function keyExists(key) {
    if (!state.config) return false;
    if (Object.prototype.hasOwnProperty.call(state.config, key)) return true;
    if (key.includes("{i}")) {
      const rx = new RegExp("^" + key.replace(/[.*+?^${}()|[\]\\]/g, "\\$&").replace("\\{i\\}", "\\d+") + "$");
      return Object.keys(state.config).some(k => rx.test(k));
    }
    return false;
  }

  function attrKeys(selectorAttrs) {
    const rows = [];
    selectorAttrs.forEach(attr => {
      $$("[" + attr + "]", state.doc).forEach(el => {
        const keys = splitKeys(el.getAttribute(attr));
        keys.forEach(key => rows.push({ attr, key, tag: labelFor(el) }));
      });
    });
    return rows;
  }

  function labelFor(el) {
    const id = el.id ? "#" + el.id : "";
    const cls = (el.className && typeof el.className === "string") ? "." + el.className.trim().split(/\s+/).slice(0, 2).join(".") : "";
    return el.tagName.toLowerCase() + id + cls;
  }

  function classSelector(name) {
    return "." + String(name || "").replace(/[^a-zA-Z0-9_-]/g, "\\$&");
  }

  function configEntries(regex) {
    if (!state.config) return [];
    return Object.entries(state.config).filter(([key]) => regex.test(key));
  }

  async function runTests() {
    resetUi();
    state.startedAt = performance.now();
    state.url = absoluteUrl($("#siteUrl").value.trim() || "./index.html");
    state.configUrl = siblingUrl(state.url, "config.json");
    const panelRaw = $("#panelUrl").value.trim();
    state.panelUrl = panelRaw ? absoluteUrl(panelRaw) : "";

    $("#runBtn").disabled = true;
    try {
      await loadFiles();
      await runCheck("data-keys", checkDataKeys);
      await runCheck("toggles", checkToggles);
      await runCheck("variants", checkVariants);
      await runCheck("repeats", checkRepeats);
      await runCheck("images", checkImages);
      await runCheck("editable-texts", checkEditableTexts);
      await runCheck("cta", checkCta);
      await runCheck("fallbacks", checkFallbacks);
      await runCheck("title-mask", checkTitleMask);
      await runCheck("clamp-fonts", checkClampFonts);
      await runCheck("overflow", checkOverflow);
      await runCheck("badge", checkBadge);
      await runCheck("class-style", checkGenericClasses);
      await runCheck("seo", checkSeo);
      await runCheck("panel-config", checkPanelConfig);
    } finally {
      $("#runBtn").disabled = false;
      renderSummary();
      updateScore();
    }
  }

  function resetUi() {
    state.html = "";
    state.panelHtml = "";
    state.doc = null;
    state.config = null;
    state.css = "";
    state.results = [];
    $("#output").innerHTML = '<div class="empty"><div><strong>Test in corso.</strong><br>Sto leggendo index, config e pannello.</div></div>';
    CHECKS.forEach(check => setDot(check.id, "running"));
    $("#progress").style.width = "0%";
    updateScore();
  }

  async function loadFiles() {
    try {
      state.html = await fetchText(state.url);
      state.doc = new DOMParser().parseFromString(state.html, "text/html");
      state.css = parseCss(state.doc);
      addResult("load-index", "pass", "index.html caricato", state.url + "\nDimensione HTML: " + state.html.length + " caratteri");
    } catch (error) {
      addResult("load-index", "fail", "index.html non caricabile", error.message, "Servi la cartella con un server locale e apri il runner dallo stesso server.");
      throw error;
    }

    try {
      const configText = await fetchText(state.configUrl);
      state.config = JSON.parse(configText);
      addResult("load-config", "pass", "config.json valido", state.configUrl + "\nChiavi trovate: " + Object.keys(state.config).length);
    } catch (error) {
      addResult("load-config", "fail", "config.json non valido", error.message, "Correggi JSON o percorso. Il file deve stare nella stessa cartella di index.html.");
      throw error;
    }

    if (!state.panelUrl) {
      addResult("load-panel", "info", "pannello.html saltato", "Campo pannello vuoto: controllo opzionale non eseguito.");
      return;
    }
    try {
      state.panelHtml = await fetchText(state.panelUrl);
      addResult("load-panel", "pass", "pannello.html caricato", state.panelUrl + "\nDimensione HTML: " + state.panelHtml.length + " caratteri");
    } catch (error) {
      addResult("load-panel", "warn", "pannello.html non caricato", error.message, "Se vuoi controllare anche il pannello, metti il percorso corretto nel secondo campo.");
    }
  }

  async function runCheck(id, fn) {
    try {
      await Promise.resolve(fn());
    } catch (error) {
      addResult(id, "fail", "Errore nel test " + id, error.stack || error.message, "Correggi il runner o segnala questo errore: il test si e interrotto.");
    }
    await new Promise(resolve => setTimeout(resolve, 15));
  }

  function checkDataKeys() {
    const rows = attrKeys(KEY_ATTRS);
    $$("[data-show-when]", state.doc).forEach(el => {
      const raw = el.getAttribute("data-show-when") || "";
      const key = raw.split(":")[0].trim();
      if (key) rows.push({ attr: "data-show-when", key, tag: labelFor(el) });
    });
    const missing = rows.filter(row => !keyExists(row.key));
    const uniqueMissing = Array.from(new Map(missing.map(row => [row.attr + "|" + row.key, row])).values());
    const used = new Set(rows.map(row => row.key));
    const detail = [
      "Attributi controllati: " + rows.length,
      "Chiavi distinte usate: " + used.size,
      uniqueMissing.length ? "Mancanti:\n" + uniqueMissing.slice(0, 80).map(row => row.attr + '="' + row.key + '" in ' + row.tag).join("\n") : "Nessuna chiave mancante."
    ].join("\n");
    if (uniqueMissing.length) {
      addResult("data-keys", "fail", "Chiavi data-* mancanti nel config", detail, "Aggiungi le chiavi mancanti al config.json oppure correggi il nome negli attributi HTML.");
    } else {
      addResult("data-keys", "pass", "Tutte le chiavi data-* sono presenti", detail);
    }
  }

  function checkToggles() {
    const toggleRefs = attrKeys(["data-show-key"]).map(row => row.key);
    const configToggles = configEntries(/(?:^|_)(attivo|attiva|attivi)$/i).map(([key]) => key);
    const keys = Array.from(new Set(toggleRefs.concat(configToggles)));
    const invalid = keys.filter(key => keyExists(key)).map(key => [key, state.config[key]]).filter(([, value]) => value !== "" && value !== "SI" && value !== "NO");
    const booleans = Object.entries(state.config).filter(([key, value]) => keys.includes(key) && typeof value === "boolean");
    if (invalid.length || booleans.length) {
      addResult("toggles", "fail", "Toggle non coerenti", invalid.concat(booleans).map(([key, value]) => key + ": " + JSON.stringify(value)).join("\n"), "Usa sempre stringhe SI oppure NO per i toggle del pannello.");
    } else {
      addResult("toggles", "pass", "Toggle SI/NO corretti", "Toggle controllati: " + keys.length + "\n" + keys.slice(0, 60).join(", "));
    }
  }

  function checkVariants() {
    const variants = $$("[data-variant-key]", state.doc);
    const classVariants = $$("[data-class-key][data-class-map]", state.doc);
    if (!variants.length && !classVariants.length) {
      addResult("variants", "info", "Nessuna variante dichiarata", "Non sono stati trovati elementi con data-variant-key.");
      return;
    }
    const groups = new Map();
    variants.forEach(el => {
      const key = el.getAttribute("data-variant-key");
      const value = el.getAttribute("data-variant-value") || "";
      if (!groups.has(key)) groups.set(key, []);
      groups.get(key).push({ value, tag: labelFor(el) });
    });
    classVariants.forEach(el => {
      const key = el.getAttribute("data-class-key");
      let map = {};
      try { map = JSON.parse(el.getAttribute("data-class-map") || "{}"); }
      catch (error) { map = {}; }
      if (!groups.has(key)) groups.set(key, []);
      Object.keys(map).forEach(value => groups.get(key).push({ value, tag: labelFor(el) + " data-class-map" }));
      if (!Object.keys(map).length) groups.get(key).push({ value: "", tag: labelFor(el) + " data-class-map non valido" });
    });
    const problems = [];
    const details = [];
    groups.forEach((items, key) => {
      const allowed = Array.from(new Set(items.map(item => item.value).filter(Boolean)));
      const current = state.config[key];
      details.push(key + " = " + JSON.stringify(current) + " | valori HTML: " + allowed.join(", "));
      if (!keyExists(key)) problems.push(key + " manca nel config");
      else if (current && !allowed.includes(current)) problems.push(key + " ha valore " + JSON.stringify(current) + " ma HTML permette: " + allowed.join(", "));
      const empty = items.filter(item => !item.value);
      if (empty.length) problems.push(key + " ha varianti senza data-variant-value");
    });
    if (problems.length) {
      addResult("variants", "fail", "Varianti non allineate", problems.join("\n") + "\n\n" + details.join("\n"), "Allinea i valori nel config con quelli dichiarati in data-variant-value.");
    } else {
      addResult("variants", "pass", "Varianti allineate", details.join("\n"));
    }
  }

  function checkRepeats() {
    const repeatEls = $$("[data-repeat]", state.doc);
    const templateProblems = [];
    const requiredProblems = [];
    repeatEls.forEach(el => {
      const name = el.getAttribute("data-repeat");
      const templateId = el.getAttribute("data-template") || el.getAttribute("data-repeat-template");
      if (!templateId || !state.doc.getElementById(templateId)) {
        templateProblems.push(name + ": template mancante (" + (templateId || "non dichiarato") + ")");
      }
      const style = el.getAttribute("style") || "";
      if (/display\s*:\s*none/i.test(style)) {
        templateProblems.push(name + ": data-repeat ha display:none inline");
      }
      const required = el.getAttribute("data-repeat-required") || el.getAttribute("data-required-repeat") || "";
      splitKeys(required).forEach(pattern => {
        if (!keyExists(pattern)) requiredProblems.push(name + ": required " + pattern + " non trova chiavi nel config");
      });
    });
    const showRepeatProblems = $$("[data-show-repeat]", state.doc).map(el => el.getAttribute("data-show-repeat")).filter(name => {
      return !state.doc.querySelector(classSelector(name)) && !repeatEls.some(rep => rep.getAttribute("data-repeat") === name);
    });
    const problems = templateProblems.concat(requiredProblems, showRepeatProblems.map(name => "data-show-repeat punta a lista inesistente: " + name));
    if (problems.length) {
      addResult("repeats", "fail", "Problemi sulle liste ripetute", problems.join("\n"), "Controlla data-repeat, data-repeat-template, required e data-show-repeat.");
    } else {
      addResult("repeats", "pass", "Liste ripetute coerenti", "Liste trovate: " + repeatEls.length + "\n" + repeatEls.map(el => el.getAttribute("data-repeat")).join(", "));
    }
  }

  function checkImages() {
    const images = $$("img[data-src], img[data-placeholder], [data-bg]", state.doc);
    const missing = [];
    const noFigure = [];
    const beforeAfter = [];
    images.forEach(el => {
      IMAGE_ATTRS.forEach(attr => {
        if (!el.hasAttribute(attr)) return;
        splitKeys(el.getAttribute(attr)).forEach(key => {
          if (!keyExists(key)) missing.push(attr + '="' + key + '" in ' + labelFor(el));
          if (/prima_dopo_\{i\}_(prima|dopo)$/.test(key)) beforeAfter.push({ el, key });
        });
      });
      if (el.tagName === "IMG" && !el.closest("figure")) noFigure.push(labelFor(el));
    });

    const baRepeats = $$("[data-repeat]", state.doc).filter(el => /prima|dopo|before|after/i.test(el.getAttribute("data-repeat") || ""));
    const baRequiredOk = baRepeats.some(el => {
      const required = el.getAttribute("data-repeat-required") || el.getAttribute("data-required-repeat") || "";
      return required.includes("placeholder") && required.includes("prima_dopo_{i}_prima") && required.includes("prima_dopo_{i}_dopo");
    });

    if (missing.length) {
      addResult("images", "fail", "Chiavi immagine mancanti", missing.slice(0, 80).join("\n"), "Aggiungi le chiavi mancanti o correggi data-src/data-placeholder/data-bg.");
      return;
    }
    const notes = [];
    notes.push("Immagini data-driven trovate: " + images.length);
    if (noFigure.length) notes.push("IMG senza figure wrapper: " + noFigure.length + "\n" + noFigure.slice(0, 40).join("\n"));
    if (baRepeats.length) notes.push("Prima-dopo placeholder required: " + (baRequiredOk ? "ok" : "da verificare"));
    if (baRepeats.length && !baRequiredOk) {
      addResult("images", "warn", "Prima-dopo senza required placeholder completo", notes.join("\n"), "Nel data-repeat-required del prima-dopo includi anche le chiavi placeholder.");
    } else if (noFigure.length) {
      addResult("images", "warn", "Immagini valide, ma alcune senza figure", notes.join("\n"), "Non e bloccante, ma figure aiuta layout e caption.");
    } else {
      addResult("images", "pass", "Immagini e placeholder coerenti", notes.join("\n"));
    }
  }

  function checkEditableTexts() {
    const root = $("main", state.doc) || state.doc.body;
    const candidates = $$("h1,h2,h3,p,a,button,span,li", root).filter(el => {
      if (el.closest("template, script, style, .overlay, .cookie-banner, .mobile-panel")) return false;
      if (el.hasAttribute("data-text") || el.hasAttribute("data-year") || el.hasAttribute("data-show-key")) return false;
      const text = (el.textContent || "").replace(/\s+/g, " ").trim();
      if (!text || text.length < 18) return false;
      if (ALLOWED_HARDCODED.some(ok => text === ok || text.startsWith(ok))) return false;
      if (el.querySelector("[data-text]")) return false;
      return true;
    });
    if (candidates.length) {
      addResult("editable-texts", "warn", "Possibili testi cliente hardcoded", candidates.slice(0, 60).map(el => labelFor(el) + ': "' + el.textContent.replace(/\s+/g, " ").trim().slice(0, 120) + '"').join("\n"), "Se il testo deve essere gestibile dal cliente, aggiungi data-text e relativa chiave nel config.");
    } else {
      addResult("editable-texts", "pass", "Nessun testo cliente hardcoded evidente", "Controllati h1/h2/h3/p/a/button/span/li dentro main, esclusi overlay legali e UI tecnica.");
    }
  }

  function checkCta() {
    const ctas = $$("[data-cta-type]", state.doc);
    const problems = [];
    const notes = [];
    const legacyAttrs = $$("[data-cta-contact], [data-cta-fallbacks]", state.doc);
    if (legacyAttrs.length) {
      problems.push("Trovati attributi CTA legacy: " + legacyAttrs.map(labelFor).join(", "));
    }
    const globalDestinations = {
      WHATSAPP: "footer_whatsapp",
      TELEFONO: "footer_telefono",
      EMAIL: "footer_email",
      PRENOTAZIONI: "prenotazione_url"
    };
    ctas.forEach(el => {
      const typeKey = el.getAttribute("data-cta-type");
      if (typeKey && !keyExists(typeKey)) problems.push(labelFor(el) + ": data-cta-type mancante nel config (" + typeKey + ")");
      const typeValue = typeKey && state.config[typeKey];
      if (typeValue && !CTA_TYPES.includes(typeValue)) problems.push(typeKey + " = " + JSON.stringify(typeValue) + " non valido");
      if (typeValue && CTA_TYPES.includes(typeValue)) {
        const destinationKey = globalDestinations[typeValue];
        if (destinationKey && !keyExists(destinationKey)) problems.push(typeKey + " usa " + typeValue + " ma manca " + destinationKey);
      }
      notes.push(labelFor(el) + " -> tipo " + (typeKey || "-") + ", destinazione globale " + (globalDestinations[typeValue] || "-"));
    });
    if (problems.length) {
      addResult("cta", "fail", "CTA non coerenti", problems.join("\n") + "\n\n" + notes.join("\n"), "Usa tipi WHATSAPP/TELEFONO/EMAIL e chiavi contatto esistenti.");
    } else {
      addResult("cta", "pass", "CTA coerenti", notes.length ? notes.join("\n") : "Nessuna CTA data-driven trovata.");
    }
  }

  function checkFallbacks() {
    const fallbackEls = $$("[data-fallback]", state.doc);
    const nonCta = fallbackEls.filter(el => !el.hasAttribute("data-cta-type"));
    const hasIgnoreScript = /data-fallback/.test(state.html) && /(hide-empty|data-hide-empty|fallback)/i.test(state.html);
    const detail = [
      "data-fallback totali: " + fallbackEls.length,
      "data-fallback non CTA: " + nonCta.length,
      nonCta.slice(0, 60).map(el => labelFor(el) + " -> " + (el.getAttribute("data-text") || el.getAttribute("data-src") || "-")).join("\n")
    ].filter(Boolean).join("\n");
    if (!fallbackEls.length) {
      addResult("fallbacks", "pass", "Nessun fallback statico", "Il template non usa data-fallback.");
    } else if (hasIgnoreScript) {
      addResult("fallbacks", "info", "Fallback presenti ma gestiti dal motore", detail + "\n\nNota: il controllo non esegue il motore. Verifica in browser che i testi vuoti spariscano.");
    } else {
      addResult("fallbacks", "warn", "Fallback statici da verificare", detail, "Se vuoi che il testo vuoto sparisca, il motore deve ignorare questi fallback fuori dalle CTA volute.");
    }
  }

  function checkTitleMask() {
    const headings = $$("h1,h2,h3", state.doc).filter(el => !el.closest("template"));
    const unmasked = headings.filter(el => !el.closest(".title-mask"));
    if (unmasked.length) {
      addResult("title-mask", "warn", "Heading senza title-mask", unmasked.map(el => labelFor(el) + ': "' + (el.textContent || "").trim().slice(0, 80) + '"').join("\n"), "Avvolgi solo i titoli principali che usano reveal/mask. Non e un errore funzionale per titoli tecnici o modali.");
    } else {
      addResult("title-mask", "pass", "Heading principali coperti", "Heading controllati: " + headings.length);
    }
  }

  function cssRules() {
    const rules = [];
    const re = /([^{}]+)\{([^{}]+)\}/g;
    let match;
    while ((match = re.exec(state.css))) {
      rules.push({ selector: match[1].trim(), body: match[2].trim() });
    }
    return rules;
  }

  function checkClampFonts() {
    const rules = cssRules().filter(rule => /(^|[\s,>])h[123]\b/.test(rule.selector) && /font-size\s*:/.test(rule.body));
    const noClamp = rules.filter(rule => {
      const m = rule.body.match(/font-size\s*:\s*([^;]+)/);
      return m && !m[1].includes("clamp(");
    });
    if (noClamp.length) {
      addResult("clamp-fonts", "warn", "Regole heading senza clamp()", noClamp.map(rule => rule.selector + " { " + rule.body.match(/font-size\s*:[^;]+/)?.[0] + " }").join("\n"), "Usa clamp(min, viewport, max) sui font-size degli heading principali.");
    } else {
      addResult("clamp-fonts", "pass", "Font heading responsive", "Regole heading con font-size controllate: " + rules.length);
    }
  }

  function checkOverflow() {
    const hasHtmlClip = /html\s*\{[^}]*overflow-x\s*:\s*clip/i.test(state.css) || /html,\s*body\s*\{[^}]*overflow-x\s*:\s*clip/i.test(state.css);
    const hasAnywhere = /overflow-wrap\s*:\s*anywhere/i.test(state.css);
    const hasClamp = /clamp\(/i.test(state.css);
    const hasLineClamp = /-webkit-line-clamp/i.test(state.css);
    const bodyHidden = /body\s*\{[^}]*overflow\s*:\s*hidden/i.test(state.css);
    const problems = [];
    if (!hasHtmlClip) problems.push("Manca html { overflow-x: clip }");
    if (!hasAnywhere) problems.push("Manca overflow-wrap:anywhere");
    if (!hasClamp) problems.push("Manca clamp() nel CSS");
    if (!hasLineClamp) problems.push("Manca -webkit-line-clamp per testi lunghi");
    if (bodyHidden) problems.push("body { overflow:hidden } puo rompere sticky/scroll");
    const detail = [
      "overflow-x clip: " + (hasHtmlClip ? "si" : "no"),
      "overflow-wrap anywhere: " + (hasAnywhere ? "si" : "no"),
      "clamp(): " + (hasClamp ? "si" : "no"),
      "line-clamp: " + (hasLineClamp ? "si" : "no"),
      "body overflow hidden globale: " + (bodyHidden ? "si" : "no")
    ].join("\n");
    if (problems.length) {
      addResult("overflow", problems.some(p => p.includes("Manca html")) ? "fail" : "warn", "Protezione overflow incompleta", problems.join("\n") + "\n\n" + detail, "Aggiungi clip su html, anywhere sui testi grandi e line-clamp dove il contenuto e variabile.");
    } else {
      addResult("overflow", "pass", "Protezione overflow presente", detail);
    }
  }

  function checkBadge() {
    const hasBadge = !!state.doc.getElementById("floating-badge") || /badge_attivo|floating-badge/.test(state.html);
    if (!hasBadge) {
      addResult("badge", "info", "Badge non presente", "Nessun #floating-badge trovato.");
      return;
    }
    const baseHidden = /#floating-badge\s*\{[^}]*display\s*:\s*none/i.test(state.css);
    const mobileShown = /@media[^{]*max-width\s*:\s*767px[\s\S]*?#floating-badge\s*\{[^}]*display\s*:\s*flex/i.test(state.css) || /@media[^{]*max-width\s*:\s*767px[\s\S]*?#floating-badge\s*\{[^}]*display\s*:\s*block/i.test(state.css);
    if (baseHidden && mobileShown) {
      addResult("badge", "pass", "Badge limitato al mobile", "#floating-badge display:none di base e display attivo sotto 767px.");
    } else {
      addResult("badge", "warn", "Badge mobile da verificare", "display:none base: " + baseHidden + "\nmedia max-width 767 con display: " + mobileShown, "Imposta #floating-badge display:none fuori media e mostralo solo in @media (max-width: 767px).");
    }
  }

  function checkGenericClasses() {
    const found = [];
    $$("[class]", state.doc).forEach(el => {
      const classes = String(el.getAttribute("class") || "").split(/\s+/).filter(Boolean);
      classes.forEach(cls => {
        if (GENERIC_CLASSES.includes(cls)) found.push(cls + " in " + labelFor(el));
      });
    });
    const unique = Array.from(new Set(found));
    if (unique.length) {
      addResult("class-style", "warn", "Classi generiche trovate", unique.slice(0, 80).join("\n"), "Non e un bug di runtime. Rinomina solo se vuoi mantenere BEM stretto nello skeleton.");
    } else {
      addResult("class-style", "pass", "Nessuna classe generica vietata", "Controllo esatto sulle classi: " + GENERIC_CLASSES.join(", "));
    }
  }

  function checkSeo() {
    const hasTitleCode = /document\.title|seo_titolo/i.test(state.html);
    const hasDescription = !!state.doc.querySelector('meta[name="description"]') || /seo_descrizione/i.test(state.html);
    const hasOg = !!state.doc.querySelector('meta[property="og:image"]') || /og_immagine/i.test(state.html);
    const hasJsonLd = !!state.doc.querySelector('script[type="application/ld+json"]') || /LocalBusiness|application\/ld\+json/i.test(state.html);
    const schemaKeys = ["schema_nome", "schema_indirizzo", "schema_telefono", "schema_orari"];
    const missingSchema = schemaKeys.filter(key => !keyExists(key));
    const footerFirstHints = ["footer_nome", "footer_indirizzo", "footer_telefono", "footer_whatsapp", "footer_orari"].filter(token => state.html.includes(token));
    const problems = [];
    if (!hasTitleCode) problems.push("Titolo SEO non trovato");
    if (!hasDescription) problems.push("Meta description non trovata");
    if (!hasOg) problems.push("Open Graph image non trovata");
    if (!hasJsonLd) problems.push("Schema LocalBusiness non trovato");
    if (missingSchema.length) problems.push("Chiavi schema mancanti: " + missingSchema.join(", "));
    const detail = [
      "title/seo_titolo: " + hasTitleCode,
      "description: " + hasDescription,
      "og:image: " + hasOg,
      "LocalBusiness JSON-LD: " + hasJsonLd,
      "schema keys mancanti: " + (missingSchema.join(", ") || "nessuna"),
      "indizi footer usati nello schema: " + footerFirstHints.join(", ")
    ].join("\n");
    if (problems.length) {
      addResult("seo", "warn", "SEO/schema da verificare", problems.join("\n") + "\n\n" + detail, "Controlla che SEO e schema vengano aggiornati dal config e dai dati footer.");
    } else {
      addResult("seo", "pass", "SEO e schema presenti", detail);
    }
  }

  function checkPanelConfig() {
    if (!state.panelHtml) {
      addResult("panel-config", "info", "Pannello non analizzato", "pannello.html non e stato caricato.");
      return;
    }
    const notes = [];
    const problems = [];
    if (!/SECTION_DEFS|sections|sezioni/i.test(state.panelHtml)) problems.push("Non trovo una definizione sezioni nel pannello");
    if (!/nastro/i.test(state.panelHtml) && Object.keys(state.config).some(key => key.startsWith("nastro_"))) problems.push("Config ha chiavi nastro_ ma il pannello non sembra avere la sezione Nastro");
    if (Object.keys(state.config).some(key => key.startsWith("schema_")) && !/DERIVED_KEYS|schema_/i.test(state.panelHtml)) problems.push("Chiavi schema presenti, ma nel pannello non vedo logica per schema/derived keys");
    if (!/maxLen|maxlength|maxlengths/i.test(state.panelHtml)) notes.push("Non vedo limiti caratteri espliciti nel pannello");
    if (/github|token/i.test(state.panelHtml)) notes.push("GitHub/token: presente");
    const configKeys = Object.keys(state.config);
    const panelMentions = configKeys.filter(key => state.panelHtml.includes(key)).length;
    notes.push("Chiavi config citate direttamente nel pannello: " + panelMentions + "/" + configKeys.length);
    if (problems.length) {
      addResult("panel-config", "warn", "Pannello da verificare", problems.join("\n") + "\n\n" + notes.join("\n"), "Controlla SECTION_DEFS, chiavi derivate e sezioni speciali come Nastro.");
    } else {
      addResult("panel-config", "pass", "Pannello coerente a livello statico", notes.join("\n"));
    }
  }

  function openPreview() {
    const url = absoluteUrl($("#siteUrl").value.trim() || "./index.html");
    $("#preview").classList.add("open");
    $("#preview").setAttribute("aria-hidden", "false");
    $("#previewUrl").textContent = url;
    $("#previewFrame").src = url;
  }

  function closePreview() {
    $("#preview").classList.remove("open");
    $("#preview").setAttribute("aria-hidden", "true");
  }

  async function copyReport() {
    const payload = {
      generatedAt: new Date().toISOString(),
      siteUrl: state.url,
      configUrl: state.configUrl,
      panelUrl: state.panelUrl,
      results: state.results
    };
    const text = JSON.stringify(payload, null, 2);
    try {
      await navigator.clipboard.writeText(text);
      $("#copyBtn").textContent = "Copiato";
      setTimeout(() => { $("#copyBtn").textContent = "Copia report"; }, 1200);
    } catch (error) {
      const blob = new Blob([text], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "ompage-report.json";
      a.click();
      URL.revokeObjectURL(url);
    }
  }

  $("#runBtn").addEventListener("click", runTests);
  $("#previewBtn").addEventListener("click", openPreview);
  $("#copyBtn").addEventListener("click", copyReport);
  $("#closePreview").addEventListener("click", closePreview);
  $$("[data-vp]").forEach(btn => {
    btn.addEventListener("click", () => {
      $("#previewWrap").className = "preview-frame-wrap " + btn.dataset.vp;
    });
  });
  document.addEventListener("keydown", event => {
    if (event.key === "Enter" && event.target && event.target.id === "siteUrl") runTests();
    if (event.key === "Escape") closePreview();
  });

  buildSidebar();
  const params = new URLSearchParams(window.location.search);
  if (params.has("site")) $("#siteUrl").value = params.get("site") || "./index.html";
  if (params.has("panel")) $("#panelUrl").value = params.get("panel") || "";
  if (params.has("run")) setTimeout(runTests, 80);
})();
</script>
</body>
</html>
